<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Control de Asistencia</title>

  <link rel="stylesheet" href="./login.css" />
</head>
<body>

  <main class="login-page">
    <section class="login-card">

      <div class="logo-box">
        <img src="../../assets/img/logo-vertical.png" alt="Logo Ovalle DEM" />
      </div>

      <h1>Sistema Web de Control de Asistencia</h1>
      <p class="subtitle">Departamento de Educación Municipal</p>

      <form id="loginForm" class="login-form">
        <div class="input-group">
          <label for="correo">Correo institucional</label>
          <input 
            type="email" 
            id="correo" 
            placeholder="usuario@demovalle.cl"
            required
          />
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            placeholder="Ingrese su contraseña"
            required
          />
        </div>

        <button type="submit" id="btnLogin">
          Iniciar sesión
        </button>

        <p id="mensaje" class="mensaje"></p>
      </form>

    </section>
  </main>

  <script src="../../assets/js/config.js"></script>
  <script src="./login.js"></script>
</body>
</html>
